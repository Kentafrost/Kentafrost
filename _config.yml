# Jekyll Configuration for GitHub Pages
title: "KFrost - Software/Cloud Engineer"
description: "AWS運用エンジニア → 開発エンジニアへのキャリアチェンジを目指す"
author: "KFrost"
email: ""
baseurl: "/Kentafrost"
url: "https://kentafrost.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude files from processing
exclude:
  - .git/
  - .gitignore
  - README_EN.md
  - vendor/
  - node_modules/

# Navigation
header_pages:
  - README.md
  - doc/Career_JP.md

# Social media and links
github_username: kentafrost

# Custom variables
show_excerpts: true
date_format: "%Y年%m月%d日"

# Sass configuration
sass:
  sass_dir: _sass
  style: compressed