name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate career sections
        run: npx --yes tsx scripts/generate-career-sections.ts

      - name: Generate blog pages from md (verbose)
        id: blog-gen
        run: npx --yes tsx scripts/generate-blog-pages.ts --verbose

      # Display blog generation stats from a JSON file output by the generation script, if it exists
      - name: Display blog generation stats
        if: always()
        run: |
          if [ -f "blog/generation-stats.json" ]; then
            STATS=$(cat blog/generation-stats.json)
            CREATED=$(echo "$STATS" | grep -o '"created": [0-9]*' | grep -o '[0-9]*')
            UPDATED=$(echo "$STATS" | grep -o '"updated": [0-9]*' | grep -o '[0-9]*')
            UNCHANGED=$(echo "$STATS" | grep -o '"unchanged": [0-9]*' | grep -o '[0-9]*')
            DELETED=$(echo "$STATS" | grep -o '"deleted": [0-9]*' | grep -o '[0-9]*')
            echo "::notice title=Blog Generation Complete::✅ Created: ${CREATED} | ⬆️ Updated: ${UPDATED} | Unchanged: ${UNCHANGED} | Total: $((CREATED + UPDATED + UNCHANGED)) posts"
            if [ "$DELETED" -gt 0 ]; then
              echo "::warning title=Deleted Files::🗑️ ${DELETED} blog file(s) were deleted"
            fi
          fi

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: |
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4